<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #060914; }
    video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <video autoplay loop muted playsinline preload="auto">
    <source src="https://kaoljqciecsnafblzmci.supabase.co/storage/v1/object/public/video/Pavilion_Square_Luxury_Residences_Urban_Luxe_720P.mp4" type="video/mp4" />
  </video>
  <script>
    const v = document.querySelector('video');
    v.muted = true;
    v.play().catch(() => {});
  </script>
</body>
</html>
